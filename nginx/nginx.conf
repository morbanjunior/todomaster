limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

upstream auth_service {
    server auth-service:8003;
}

upstream user_service {
    server user-service:8001;
}

upstream task_service {
    server task-service:8002;
}

server {
    listen 80;
    server_name _;

    # nginx maneja CORS centralmente; ocultamos los del backend para evitar duplicados
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    # Headers CORS para todas las respuestas (heredados por location blocks sin add_header propio)
    add_header 'Access-Control-Allow-Origin'  '*'                                  always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS'    always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type'        always;
    add_header 'Access-Control-Max-Age'       '86400'                              always;

    # Preflight OPTIONS — hereda add_header del server block, no necesita los suyos
    if ($request_method = OPTIONS) {
        return 204;
    }

    proxy_intercept_errors on;
    error_page 502 503 504 @service_down;

    # Named locations NO heredan add_header del server block — se declaran aquí
    location @service_down {
        add_header 'Access-Control-Allow-Origin'  '*'                               always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type'     always;
        default_type application/json;
        return 503 '{"detail": "Service temporarily unavailable. Please try again later."}';
    }

    # Health check routes
    location = /health/auth {
        proxy_pass http://auth_service/health;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location = /health/users {
        proxy_pass http://user_service/health;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    location = /health/tasks {
        proxy_pass http://task_service/health;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # Auth routes (rate-limited: 10 req/s, burst de 20)
    location /auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://auth_service;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # User routes
    location /users/ {
        proxy_pass http://user_service;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # Task routes
    location /tasks/ {
        proxy_pass http://task_service;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
