services:

  # ─── DATABASES ──────────────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:15-alpine
    container_name: db_auth
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - micro_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres-user:
    image: postgres:15-alpine
    container_name: db_user
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - micro_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb-task:
    image: mongo:6.0
    container_name: db_task
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - micro_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: message_broker
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - micro_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MICROSERVICES ──────────────────────────────────────────────────────────

  auth-service:
    build: ./auth-service
    container_name: auth_service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-auth:5432/auth_db
      SECRET_KEY: ${SECRET_KEY}
      USER_SERVICE_URL: http://user-service:8001
    ports:
      - "8003:8003"
    networks:
      - micro_network
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  user-service:
    build: ./user-service
    container_name: user_service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-user:5432/user_db
      SECRET_KEY: ${SECRET_KEY}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    ports:
      - "8001:8001"
    networks:
      - micro_network
    depends_on:
      postgres-user:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  task-service:
    build: ./task-service
    container_name: task_service
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb-task:27017
      SECRET_KEY: ${SECRET_KEY}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
    ports:
      - "8002:8002"
    networks:
      - micro_network
    depends_on:
      mongodb-task:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  notification-worker:
    build: ./notification-worker
    container_name: notification_worker
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    networks:
      - micro_network
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  # ─── GATEWAY & FRONTEND ─────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - micro_network
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      task-service:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      BACKEND_URL: http://nginx
    ports:
      - "3001:3000"
    networks:
      - micro_network
    depends_on:
      nginx:
        condition: service_started

volumes:
  postgres_auth_data:
  postgres_user_data:
  mongodb_data:

networks:
  micro_network:
    driver: bridge
